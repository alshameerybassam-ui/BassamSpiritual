<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة المستفيد | مركز النور الرباني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --deep-navy: #0A1628;
            --gold: #F5B041;
            --gold-dark: #E67E22;
            --card-bg: #FFFFFF;
            --bg-main: #F4F6F9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-main);
            color: var(--deep-navy);
            min-height: 100vh;
        }
        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 25px 20px 40px;
        }
        .dashboard-header {
            background: linear-gradient(135deg, var(--deep-navy), #1B2A3D);
            color: #fff;
            padding: 25px 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(10,22,40,0.2);
            border-bottom: 5px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .dashboard-header h1 { font-size: 1.8rem; font-weight: 800; }
        .dashboard-header h1 span { color: var(--gold); }
        .btn-outline-light {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline-light:hover { background: #e74c3c; border-color: #e74c3c; }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A1628;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,176,65,0.4); }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.04);
            border-right: 5px solid var(--gold);
            margin-bottom: 25px;
        }
        .card h3 { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card h3 i { color: var(--gold); font-size: 1.4rem; }
        
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .stat-item:last-child { border-bottom: none; }
        
        .request-card {
            background: #FAFBFC;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        .request-card:hover { border-color: var(--gold); box-shadow: 0 5px 20px rgba(245,176,65,0.1); }
        .request-card .badge-status {
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
        }
        .badge-pending { background: #FEF3C7; color: #92400E; }
        .badge-processing { background: #DBEAFE; color: #1E40AF; }
        .badge-completed { background: #D1FAE5; color: #065F46; }
        .badge-rejected { background: #FEE2E2; color: #991B1B; }
        
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(10,22,40,0.7);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 24px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border-top: 8px solid var(--gold);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .modal-box h3 { margin-bottom: 20px; color: var(--deep-navy); }
        .modal-box textarea, .modal-box select, .modal-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-family: 'Cairo';
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        .modal-box textarea { min-height: 120px; }
        .modal-close {
            float: left;
            font-size: 1.8rem;
            cursor: pointer;
            color: #999;
            transition: 0.3s;
            background: none;
            border: none;
        }
        .modal-close:hover { color: #e74c3c; transform: rotate(90deg); }

        .mic-btn {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background: #f1f5f9;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 1rem;
            color: #64748B;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }
        .mic-btn:hover { background: #e2e8f0; color: #F5B041; }
        .mic-btn.recording { color: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .textarea-wrapper { position: relative; }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 99999;
            display: none;
            min-width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-family: 'Cairo';
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }
        .notification.show { display: block; }
        
        @media (max-width: 768px) {
            .grid-2col { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1 id="welcomeMessage">مرحباً، <span>مستفيد النور</span></h1>
                <p style="opacity:0.8; margin-top:5px;"><i class="bi bi-shield-fill-check" style="color:var(--gold);"></i> جلسة آمنة ومشفرة بخصوصية تامة</p>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <a href="/" class="btn-outline-light"><i class="bi bi-house"></i> العودة للمركز</a>
                <button class="btn-primary" onclick="openNewRequestModal()"><i class="bi bi-plus-circle"></i> طلب جديد</button>
                <a href="/login.html" class="btn-outline-light" onclick="localStorage.clear()"><i class="bi bi-box-arrow-right"></i> خروج</a>
            </div>
        </div>

        <div class="grid-2col">
            <div>
                <div class="card">
                    <h3><i class="bi bi-person-circle"></i> ملفي الشخصي</h3>
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                        <div style="width:55px; height:55px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); display:flex; align-items:center; justify-content:center; color:#0A1628; font-size:1.5rem; font-weight:800;">ب</div>
                        <div>
                            <strong id="sidebarName" style="font-size:1.1rem;">---</strong>
                            <br><small id="sidebarEmail" style="color:#666;">---</small>
                        </div>
                    </div>
                    <div class="stat-item"><span>📱 الهاتف</span> <span id="sidebarPhone">---</span></div>
                    <div class="stat-item"><span>📅 التسجيل</span> <span id="sidebarJoined">---</span></div>
                </div>

                <div class="card">
                    <h3><i class="bi bi-chart-pie"></i> إحصائياتي</h3>
                    <div class="stat-item"><span>📋 إجمالي الطلبات</span> <span id="statTotal">0</span></div>
                    <div class="stat-item"><span>⏳ قيد الانتظار</span> <span id="statPending">0</span></div>
                    <div class="stat-item"><span>✅ مكتملة</span> <span id="statCompleted">0</span></div>
                    <div class="stat-item"><span>❌ ملغاة</span> <span id="statRejected">0</span></div>
                </div>
            </div>

            <div>
                <div class="card" style="border-right-color: #1B4D3D;">
                    <h3><i class="bi bi-list-ul"></i> طلباتي العلاجية</h3>
                    <div id="requestsContainer">
                        <p style="text-align:center; color:#888; padding:20px;">جاري تحميل الطلبات...</p>
                    </div>
                </div>
                
                <div id="feedbackSection" style="display:none;">
                    <div class="card" style="border-right-color: #2ecc71;">
                        <h3><i class="bi bi-chat-quote-fill" style="color:#2ecc71;"></i> شارك تجربتك</h3>
                        <form id="reviewForm" onsubmit="submitReview(event)">
                            <label style="font-weight:600; display:block; margin-bottom:5px;">التقييم</label>
                            <select id="reviewRating" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; font-family:'Cairo';">
                                <option value="5">⭐⭐⭐⭐⭐ ممتاز</option>
                                <option value="4">⭐⭐⭐⭐ جيد جداً</option>
                                <option value="3">⭐⭐⭐ جيد</option>
                            </select>
                            <label style="font-weight:600; display:block; margin-bottom:5px;">تعليقك</label>
                            <textarea id="reviewComment" placeholder="اكتب تجربتك..." required></textarea>
                            <button type="submit" class="btn-primary" style="width:100%;"><i class="bi bi-send"></i> إرسال</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="newRequestModal" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeNewRequestModal()">&times;</button>
            <h3><i class="bi bi-heart-pulse"></i> تقديم طلب جديد</h3>
            <form id="newRequestForm" onsubmit="submitNewRequest(event)">
                <label style="font-weight:600; display:block; margin-bottom:5px;">نوع الخدمة</label>
                <select id="reqServiceType" required>
                    <option value="استشارة روحانية">استشارة روحانية (100 ر.س)</option>
                    <option value="علاج روحي">علاج روحي (100 ر.س)</option>
                    <option value="تفسير رؤيا">تفسير رؤيا (100 ر.س)</option>
                    <option value="حل مشكلة أسرية">حل مشكلة أسرية (100 ر.س)</option>
                    <option value="جلسة صوتية">جلسة صوتية (350 ر.س)</option>
                </select>
                <label style="font-weight:600; display:block; margin-bottom:5px;">وصف الحالة بالتفصيل</label>
                <div class="textarea-wrapper">
                    <textarea id="reqDescription" placeholder="اكتب ما تعاني منه بكل وضوح..." required></textarea>
                    <button type="button" class="mic-btn" id="descMicBtn" title="تحدث لوصف حالتك">
                        <i class="bi bi-mic"></i> تحدث
                    </button>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;"><i class="bi bi-send"></i> إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function openNewRequestModal() {
            document.getElementById('newRequestModal').classList.add('show');
        }
        function closeNewRequestModal() {
            document.getElementById('newRequestModal').classList.remove('show');
        }

        document.getElementById('descMicBtn').addEventListener('click', function() {
            if (!('webkitSpeechRecognition' in window)) {
                return showToast('⚠️ متصفحك لا يدعم الإملاء الصوتي.', 'error');
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;
            const btn = this;
            const icon = btn.querySelector('i');
            btn.classList.add('recording');
            icon.className = 'bi bi-mic-fill';
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                const textarea = document.getElementById('reqDescription');
                textarea.value += (textarea.value ? ' ' : '') + transcript;
                btn.classList.remove('recording');
                icon.className = 'bi bi-mic';
            };
            recognition.onerror = function() {
                btn.classList.remove('recording');
                icon.className = 'bi bi-mic';
                showToast('❌ فشل التعرف على الصوت.', 'error');
            };
            recognition.start();
        });

        async function submitNewRequest(e) {
            e.preventDefault();
            const serviceType = document.getElementById('reqServiceType').value;
            const description = document.getElementById('reqDescription').value.trim();
            if(!description) return showToast('الرجاء كتابة وصف للحالة.', 'error');
            try {
                await UserAPI.submitRequest(serviceType, description);
                showToast('تم تقديم الطلب بنجاح.');
                closeNewRequestModal();
                document.getElementById('newRequestForm').reset();
                DashboardModule.load();
            } catch(err) { showToast(err.message, 'error'); }
        }

        async function submitReview(e) {
            e.preventDefault();
            const rating = document.getElementById('reviewRating').value;
            const comment = document.getElementById('reviewComment').value.trim();
            if(!comment) return showToast('الرجاء كتابة تعليق.', 'error');
            try {
                await UserAPI.submitReview(comment, rating);
                showToast('شكراً لمشاركتك تجربتك.');
                document.getElementById('reviewForm').reset();
            } catch(err) { showToast(err.message, 'error'); }
        }
    </script>
</body>
</html>
