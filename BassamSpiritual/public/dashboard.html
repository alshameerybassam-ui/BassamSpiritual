<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المستفيد | مركز النور الرباني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .user-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .user-header {
            background: linear-gradient(135deg, #0A1628 0%, #1B2A3D 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(10, 22, 40, 0.15);
            border-bottom: 4px solid #F5B041;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .user-header h1 span {
            color: #F5B041;
        }
        .logout-btn {
            background-color: rgba(231, 76, 60, 0.2);
            color: #ff7675;
            border: 1px solid rgba(231, 76, 60, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background-color: #e74c3c;
            color: white;
        }
        .dashboard-card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }
        .dashboard-card h3 {
            margin-top: 0;
            color: #0A1628;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #fdfaf4;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(245, 176, 65, 0.2);
            margin-top: 15px;
        }
        .status-icon {
            font-size: 2rem;
            color: #F5B041;
        }
        .badge-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge-pending { background-color: #ffeaa7; color: #d63031; }
        .badge-progress { background-color: #dfe6e9; color: #2d3436; }
        .badge-completed { background-color: #dff9fb; color: #0984e3; }
        
        .sheikh-notes {
            background-color: #f0f3f6;
            border-right: 4px solid #0A1628;
            padding: 15px;
            border-radius: 4px 12px 12px 4px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="user-container">
        <!-- ترويسة لوحة تحكم المستفيد -->
        <header class="user-header">
            <div>
                <h1 id="welcomeMessage">أهلاً بك يا <span>مستفيد</span></h1>
                <p style="margin: 5px 0 0; color: #aec1d4; font-size: 0.95rem;"><i class="bi bi-shield-fill-check" style="color: #F5B041;"></i> خصوصيتك وسريتك محفوظة بعهد الله ومحمية بالكامل.</p>
            </div>
            <a href="/logout" class="logout-btn"><i class="bi bi-box-arrow-right"></i> تسجيل الخروج</a>
        </header>

        <!-- كارت حالة طلب العلاج الحالي للزائر -->
        <div class="dashboard-card">
            <h3><i class="bi bi-activity" style="color: #F5B041;"></i> حالة طلب التشخيص والعلاج الحالي</h3>
            
            <div id="requestStatusContainer">
                <p style="text-align: center; color: #7f8c8d;"><i class="bi bi-arrow-clockwise btn-spin"></i> جاري جلب تفاصيل طلبك بأمان...</p>
            </div>
        </div>

        <!-- كارت تقديم رأي أو تجربة بعد الشفاء -->
        <div class="dashboard-card" id="feedbackCard" style="display: none;">
            <h3><i class="bi bi-chat-quote-fill" style="color: #F5B041;"></i> مشاركة تجربة شفائك (اختياري)</h3>
            <p style="font-size: 0.9rem; color: #7f8c8d;">مشاركتك لتجربتك تساعد الآخرين على التمسك بالأمل واليقين بالشفاء الرباني. (يمكنك الكتابة باسم مستعار لحفظ كامل خصوصيتك).</p>
            
            <form id="testimonialForm" onsubmit="submitTestimonial(event)">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">الاسم (أو اسم مستعار يضمن خصوصيتك):</label>
                    <input type="text" id="testName" class="form-control" placeholder="مثال: فاعل خير، أخت في الله، مستفيد كريم" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">التقييم:</label>
                    <select id="testRating" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="5">⭐⭐⭐⭐⭐ ممتاز جداً</option>
                        <option value="4">⭐⭐⭐⭐ جيد جداً</option>
                        <option value="3">⭐⭐⭐ جيد</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">اكتب تجربتك أو كلمتك للشيخ بسام:</label>
                    <textarea id="testFeedback" rows="4" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;" placeholder="اكتب هنا ما شعرت به من تحسن وتجربتك مع الرقية والعلاج..." required></textarea>
                </div>
                <button type="submit" style="background: linear-gradient(135deg, #F5B041, #E67E22); color: #0A1628; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">إرسال المراجعة</button>
            </form>
        </div>
    </div>

    <script>
        // دالة جلب بيانات المستفيد وطلبه الشخصي فقط
        async function fetchUserProfile() {
            try {
                // جلب بيانات الجلسة الحالية للمستفيد
                const response = await fetch('/api/user/profile');
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                const data = await response.json();
                
                document.getElementById('welcomeMessage').innerHTML = `أهلاً بك يا <span>${data.name}</span>`;
                
                // جلب الطلب الخاص بهذا المستفيد فقط
                fetchUserRequest(data.userId);
            } catch (error) {
                console.error(error);
                window.location.href = '/login.html';
            }
        }

        async function fetchUserRequest(userId) {
            const container = document.getElementById('requestStatusContainer');
            try {
                const response = await fetch(`/api/user/requests`);
                const reqs = await response.json();

                if (!reqs || reqs.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <i class="bi bi-clipboard-x-fill" style="font-size: 2.5rem; color: #bdc3c7;"></i>
                            <p style="margin-top: 10px;">لم تقم بتقديم أي طلب علاج أو كشف بعد.</p>
                            <a href="/login.html" style="color: #F5B041; text-decoration: none; font-weight: bold;">اضغط هنا لتقديم طلبك الأول الآن</a>
                        </div>`;
                    return;
                }

                // نأخذ آخر طلب قدمه المستفيد لمتابعته
                const activeReq = reqs[0]; 

                let statusBadge = '';
                let statusDesc = '';

                if (activeReq.status === 'pending') {
                    statusBadge = '<span class="badge-status badge-pending">قيد المراجعة</span>';
                    statusDesc = 'تلقينا طلبك بخصوصية تامة، وسيقوم الشيخ بسام بالاطلاع عليه وتشخيصه قريباً جداً بإذن الله.';
                } else if (activeReq.status === 'progress') {
                    statusBadge = '<span class="badge-status badge-progress">تحت العلاج والاتصال</span>';
                    statusDesc = 'طلبك مقبول وهو الآن تحت رعاية ومتابعة الشيخ بسام المباشرة.';
                } else {
                    statusBadge = '<span class="badge-status badge-completed">تم العلاج والشفاء</span>';
                    statusDesc = 'بفضل الله ونوره، تم إتمام خطتك العلاجية وحالتك مسجلة لدينا كمستكملة الشفاء.';
                    // إظهار كارت كتابة الرأي للمستشفى الشافي
                    document.getElementById('feedbackCard').style.display = 'block';
                }

                container.innerHTML = `
                    <div class="status-box">
                        <i class="bi bi-shield-fill-check status-icon"></i>
                        <div>
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                                <strong style="font-size: 1.1rem;">نوع الخدمة: ${activeReq.serviceType || activeReq.service || 'استشفاء عام'}</strong>
                                ${statusBadge}
                            </div>
                            <p style="margin: 0; font-size: 0.95rem; color: #555;">${statusDesc}</p>
                        </div>
                    </div>
                    
                    ${activeReq.adminNotes ? `
                        <div class="sheikh-notes">
                            <h5 style="margin: 0 0 5px 0; color: #0A1628;"><i class="bi bi-chat-left-text-fill"></i> توجيهات وخطة علاج الشيخ بسام الشميري:</h5>
                            <p style="margin: 0; font-size: 0.95rem; line-height: 1.6; color: #2c3e50;">${activeReq.adminNotes}</p>
                        </div>
                    ` : ''}
                `;

            } catch (error) {
                container.innerHTML = `<p style="color: red; text-align: center;">حدث خطأ أثناء جلب تفاصيل طلبك.</p>`;
            }
        }

        async function submitTestimonial(event) {
            event.preventDefault();
            const name = document.getElementById('testName').value.trim();
            const rating = document.getElementById('testRating').value;
            const feedback = document.getElementById('testFeedback').value.trim();

            try {
                const response = await fetch('/api/testimonials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, rating: parseInt(rating), feedback, service: "برنامج استشفائي متكامل" })
                });

                if (response.ok) {
                    alert('تم إرسال تجربتك بنجاح يا أخي الكريم. ستبقى معلقة للمراجعة والسرية والموافقة قبل النشر العام.');
                    document.getElementById('testimonialForm').reset();
                } else {
                    alert('عذراً، فشل إرسال التجربة.');
                }
            } catch (err) {
                alert('خطأ في الاتصال بالخادم.');
            }
        }

        document.addEventListener('DOMContentLoaded', fetchUserProfile);
    </script>
</body>
</html>
