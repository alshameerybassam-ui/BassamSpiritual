<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل حساب جديد | مركز النور الرباني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F4F6F9 0%, #E2E8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .auth-wrapper {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(10, 22, 40, 0.15);
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            border-top: 6px solid #F5B041;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-header i {
            font-size: 3rem;
            color: #F5B041;
            margin-bottom: 10px;
            display: block;
        }
        .auth-header h2 {
            font-size: 1.8rem;
            color: #0A1628;
            margin: 0;
        }
        .auth-header h2 span { color: #F5B041; }
        .auth-header p { color: #64748B; font-size: 0.95rem; margin-top: 5px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #0A1628; font-size: 0.9rem; }
        .form-group .optional { color: #999; font-weight: 400; font-size: 0.8rem; }
        .input-wrapper { position: relative; }
        .input-wrapper .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 1.2rem; pointer-events: none; }
        .input-wrapper input {
            width: 100%; padding: 12px 45px 12px 45px; border: 2px solid #E2E8F0; border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 1rem; transition: 0.3s; box-sizing: border-box;
        }
        .input-wrapper input:focus { border-color: #F5B041; outline: none; box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.15); }

        .toggle-password-btn {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            line-height: 1;
            z-index: 2;
        }
        .toggle-password-btn:hover { color: #F5B041; }

        /* ميكروفون تلقائي */
        .mic-btn-auto {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            line-height: 1;
            z-index: 2;
        }
        .mic-btn-auto:hover { color: #F5B041; }
        
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 15px 0; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; margin-top: 3px; accent-color: #F5B041; cursor: pointer; }
        .checkbox-group label { font-size: 0.9rem; color: #4A5A6A; line-height: 1.6; }
        .checkbox-group label a { color: #F5B041; text-decoration: none; font-weight: 600; }
        
        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #F5B041, #E67E22);
            color: #0A1628; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: 0.3s; font-family: 'Cairo', sans-serif; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 176, 65, 0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-link { text-align: center; margin-top: 20px; color: #64748B; font-size: 0.95rem; }
        .auth-link a { color: #F5B041; text-decoration: none; font-weight: 700; }
        
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px;
            border-radius: 12px; color: #fff; font-weight: 600; z-index: 9999; display: none;
            min-width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Cairo';
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }
        .notification.show { display: block; }
        
        .spinner-rotate { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 500px) { .auth-wrapper { padding: 25px 20px; } }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="auth-wrapper">
        <div class="auth-header">
            <i class="bi bi-person-plus-fill"></i>
            <h2>مركز <span>النور الرباني</span></h2>
            <p>📝 إنشاء حساب جديد</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>الاسم الرباعي <span style="color:#e74c3c;">*</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="fullName" placeholder="مثال: بسام محمد هزاع الشميري" required>
                </div>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني <span style="color:#e74c3c;">*</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>رقم الهاتف (واتساب) <span class="optional">(اختياري)</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-whatsapp input-icon"></i>
                    <input type="text" id="phone" placeholder="مثال: 777941366">
                </div>
            </div>
            <div class="form-group">
                <label>كلمة المرور <span style="color:#e74c3c;">*</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="password" placeholder="على الأقل 6 أحرف" required minlength="6">
                    <button type="button" class="toggle-password-btn" id="togglePasswordBtn1" title="إظهار/إخفاء كلمة المرور">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور <span style="color:#e74c3c;">*</span></label>
                <div class="input-wrapper">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                    <button type="button" class="toggle-password-btn" id="togglePasswordBtn2" title="إظهار/إخفاء كلمة المرور">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">أوافق على الشروط والأحكام وسياسة الخصوصية، وأؤكد أنني أبلغ من العمر 18 سنة فأكثر.</label>
            </div>
            <button type="submit" class="btn-submit" id="registerBtn"><i class="bi bi-person-plus"></i> إنشاء الحساب</button>
        </form>

        <div class="auth-link">
            لديك حساب بالفعل؟ <a href="/login.html">تسجيل الدخول</a>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <a href="/" style="color:#64748B; text-decoration:none; font-size:0.9rem; display:inline-flex; align-items:center; gap:5px;">
                <i class="bi bi-arrow-right"></i> العودة إلى الرئيسية
            </a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function setupTogglePassword(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            if (!btn || !input) return;
            btn.addEventListener('click', function() {
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'bi bi-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'bi bi-eye';
                }
            });
        }
        setupTogglePassword('togglePasswordBtn1', 'password');
        setupTogglePassword('togglePasswordBtn2', 'confirmPassword');

        // إضافة أزرار الميكروفون التلقائية على جميع الحقول النصية
        setTimeout(() => {
            addMicButton(document.getElementById('fullName'));
            addMicButton(document.getElementById('email'));
            addMicButton(document.getElementById('phone'));
            // كلمات المرور لا نضيف لها ميكروفون غالباً، لكن يمكن إضافته
        }, 300);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const btn = document.getElementById('registerBtn');

            if (!fullName || fullName.length < 3) return showToast('الرجاء إدخال الاسم الرباعي بشكل صحيح.', 'error');
            if (!email || !email.includes('@')) return showToast('الرجاء إدخال بريد إلكتروني صحيح.', 'error');
            if (password.length < 6) return showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل.', 'error');
            if (password !== confirmPassword) return showToast('كلمة المرور وتأكيدها غير متطابقين.', 'error');
            if (!agreeTerms) return showToast('يرجى الموافقة على الشروط والأحكام.', 'error');

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-clockwise spinner-rotate"></i> جاري إنشاء الحساب...';

            try {
                const regRes = await AuthAPI.register(fullName, email, password, phone);
                if (!regRes.success) throw new Error(regRes.error || 'فشل التسجيل');

                const loginRes = await AuthAPI.login(email, password);
                if (loginRes.success) {
                    localStorage.setItem('bassam_auth_token', loginRes.token.trim());
                    localStorage.setItem('bassam_user', JSON.stringify(loginRes.user));
                    showToast('✅ تم إنشاء الحساب وتفعيله بنجاح! جاري التوجيه...', 'success');
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
                } else {
                    showToast('✅ تم إنشاء الحساب. يرجى تسجيل الدخول.', 'success');
                    setTimeout(() => { window.location.href = '/login.html'; }, 1500);
                }
            } catch (err) {
                showToast(err.message || 'حدث خطأ في التسجيل.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus"></i> إنشاء الحساب';
            }
        });
    </script>
</body>
</html>
