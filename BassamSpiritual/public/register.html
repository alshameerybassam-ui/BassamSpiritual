<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل حساب جديد | مركز النور الرباني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8FAFC;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 0%, rgba(245, 176, 65, 0.06) 0%, transparent 60%);
        }
        .auth-card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(10, 22, 40, 0.1);
            border-top: 6px solid #F5B041;
        }
        .auth-card .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-card .logo h2 {
            color: #0A1628;
            font-size: 1.8rem;
            margin: 0;
        }
        .auth-card .logo h2 span {
            color: #F5B041;
        }
        .auth-card .logo p {
            color: #6A7A8A;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #0A1628;
        }
        .form-group .optional {
            color: #999;
            font-weight: 400;
            font-size: 0.8rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #F5B041;
            outline: none;
            box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.15);
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #B0B8C8;
        }
        .form-group .input-wrapper input {
            padding-right: 45px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            accent-color: #F5B041;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 0.9rem;
            color: #4A5A6A;
            line-height: 1.6;
        }
        .checkbox-group label a {
            color: #F5B041;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #F5B041, #E67E22);
            color: #0A1628;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245, 176, 65, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #6A7A8A;
            font-size: 0.95rem;
        }
        .auth-link a {
            color: #F5B041;
            text-decoration: none;
            font-weight: 700;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 9999;
            display: none;
            min-width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }
        .notification.show { display: block; }
        @media (max-width: 500px) {
            .auth-card { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">
                <h2>مركز <span>النور الرباني</span></h2>
                <p>﴿ لإعادة اتزان الروح والنفس والجسد ﴾</p>
            </div>

            <h3 style="text-align:center; color:#0A1628; margin-bottom:5px;">📝 إنشاء حساب جديد</h3>
            <p style="text-align:center; color:#6A7A8A; margin-bottom:20px;">تسجيل مجاني للاستفادة من جميع الخدمات الروحية</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>الاسم الرباعي <span style="color:#e74c3c;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="مثال: بسام محمد هزاع الشميري" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني <span style="color:#e74c3c;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="example@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>رقم الهاتف (واتساب) <span class="optional">(اختياري)</span></label>
                    <div class="input-wrapper">
                        <i class="fab fa-whatsapp"></i>
                        <input type="text" id="phone" placeholder="مثال: 777941366">
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور <span style="color:#e74c3c;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="على الأقل 6 أحرف" required minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label>تأكيد كلمة المرور <span style="color:#e74c3c;">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">
                        أوافق على <a href="#">الشروط والأحكام</a> وسياسة الخصوصية، وأؤكد أنني أبلغ من العمر 18 سنة فأكثر.
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">
                    <i class="fas fa-user-plus"></i> إنشاء الحساب
                </button>
            </form>

            <div class="auth-link">
                لديك حساب بالفعل؟ <a href="/login.html">تسجيل الدخول</a>
            </div>

            <div style="text-align:center; margin-top:15px;">
                <a href="/" style="color:#6A7A8A; text-decoration:none; font-size:0.9rem;">
                    <i class="fas fa-arrow-right"></i> العودة إلى الرئيسية
                </a>
            </div>
        </div>
    </div>

    <script>
        const notification = document.getElementById('notification');
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        function showNotification(msg, type = 'success') {
            notification.textContent = msg;
            notification.className = `notification ${type} show`;
            setTimeout(() => notification.classList.remove('show'), 6000);
        }

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            if (!fullName || fullName.length < 3) {
                showNotification('⚠️ الرجاء إدخال الاسم الرباعي بشكل صحيح (3 أحرف على الأقل).', 'error');
                return;
            }
            if (!email || !email.includes('@')) {
                showNotification('⚠️ الرجاء إدخال بريد إلكتروني صحيح.', 'error');
                return;
            }
            if (password.length < 6) {
                showNotification('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل.', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showNotification('⚠️ كلمة المرور وتأكيدها غير متطابقين.', 'error');
                return;
            }
            if (!agreeTerms) {
                showNotification('⚠️ يرجى الموافقة على الشروط والأحكام.', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password, agreeTerms })
                });
                const json = await res.json();

                if (json.success) {
                    // حفظ التوكن والمستخدم في localStorage
                    localStorage.setItem('token', json.token);
                    localStorage.setItem('user', JSON.stringify(json.user));
                    showNotification('✅ تم إنشاء حسابك بنجاح! جاري تحويلك إلى لوحة التحكم...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showNotification('❌ ' + (json.error || 'حدث خطأ في التسجيل. يرجى المحاولة مرة أخرى.'), 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
                }
            } catch (e) {
                showNotification('⚠️ خطأ في الاتصال بالخادم. يرجى التحقق من اتصالك بالإنترنت.', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
            }
        });
    </script>
</body>
</html>
