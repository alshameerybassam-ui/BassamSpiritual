<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اختبار شامل | مركز النور الرباني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; padding: 20px; color: #0A1628; }
        .container { max-width: 750px; margin: auto; background: #fff; border-radius: 24px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 6px solid #F5B041; }
        h1 { text-align: center; color: #0A1628; }
        .section { border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .section h3 { margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #E2E8F0; border-radius: 10px; font-family: 'Cairo'; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #F5B041; color: #0A1628; border: none; padding: 12px 25px; border-radius: 40px; font-weight: 700; cursor: pointer; font-family: 'Cairo'; font-size: 1rem; }
        button.secondary { background: #E2E8F0; color: #0A1628; }
        .messages-box { background: #f8fafc; border-radius: 12px; padding: 15px; max-height: 350px; overflow-y: auto; margin-bottom: 15px; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 12px; max-width: 80%; }
        .msg.admin { background: #FFFBF0; border-right: 4px solid #F5B041; margin-left: auto; text-align: right; }
        .msg.user { background: #F8FAFC; border-right: 4px solid #1B4D3D; margin-right: auto; text-align: left; }
        .msg strong { display: block; margin-bottom: 4px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; display: none; font-weight: 600; }
        .test-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 اختبار شامل للمنصة</h1>
        <p style="text-align:center; color:#666;">اختبار API + المراسلات بين الشيخ والمستفيد</p>

        <div class="section">
            <h3>⚙️ اختبار الخدمات الأساسية</h3>
            <div class="test-buttons">
                <button onclick="testEndpoint('/articles', 'GET')">📄 المقالات</button>
                <button onclick="testEndpoint('/reviews', 'GET')">⭐ التقييمات</button>
                <button onclick="testEndpoint('/ai-chat', 'POST', { message: 'عين' })">🤖 الذكاء الاصطناعي</button>
                <button onclick="testEndpoint('/auth/login', 'POST', { email: 'alshameerybassam@gmail.com', password: 'bassam112358112358' })">🔑 تسجيل دخول المدير</button>
                <button onclick="testAuthVerify()">✅ التحقق من الجلسة</button>
                <button onclick="testDashboard()">📊 لوحة المستفيد</button>
            </div>
            <div id="apiStatus" class="status"></div>
        </div>

        <div class="section">
            <h3>💬 اختبار المراسلات (الشيخ ↔ المستفيد)</h3>
            <div class="grid-2">
                <div>
                    <label>رقم الطلب (requestId)</label>
                    <input type="number" id="requestId" placeholder="مثال: 1">
                </div>
                <div>
                    <label>Token الجلسة</label>
                    <input type="text" id="authToken" placeholder="يؤخذ تلقائياً من localStorage">
                    <small style="color:#666;">أدخل token يدوياً أو سجّل الدخول أولاً.</small>
                </div>
            </div>
            <button onclick="loadMessages()">📥 تحميل الرسائل</button>
            <div id="msgStatus" class="status"></div>
            <div class="messages-box" id="messagesContainer">الرجاء إدخال رقم الطلب وتحميل الرسائل.</div>
            <div class="grid-2">
                <div>
                    <h4>📨 إرسال كـ "الشيخ"</h4>
                    <textarea id="adminMsg" placeholder="رسالة من الشيخ..."></textarea>
                    <button onclick="sendAs('admin')" style="width:100%;">إرسال (شيخ)</button>
                </div>
                <div>
                    <h4>📨 إرسال كـ "المستفيد"</h4>
                    <textarea id="userMsg" placeholder="رسالة من المستفيد..."></textarea>
                    <button onclick="sendAs('user')" style="width:100%;">إرسال (مستفيد)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const BASE = '/api';

        // --- دوال مساعدة للاختبار ---
        function showApiStatus(msg, isError = false) {
            const s = document.getElementById('apiStatus');
            s.style.display = 'block';
            s.style.background = isError ? '#FEE2E2' : '#D1FAE5';
            s.style.color = isError ? '#991B1B' : '#065F46';
            s.textContent = msg;
        }

        function showMsgStatus(msg, isError = false) {
            const s = document.getElementById('msgStatus');
            s.style.display = 'block';
            s.style.background = isError ? '#FEE2E2' : '#D1FAE5';
            s.style.color = isError ? '#991B1B' : '#065F46';
            s.textContent = msg;
        }

        async function testEndpoint(path, method, body = null) {
            showApiStatus('⏳ جاري الاختبار...');
            try {
                const opts = { method, headers: { 'Content-Type': 'application/json' } };
                const token = getToken();
                if (token) opts.headers['Authorization'] = `Bearer ${token}`;
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(BASE + path, opts);
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                showApiStatus(`✅ ${method} ${path}: ${res.status} - ${JSON.stringify(data).substring(0, 100)}`);
            } catch(e) {
                showApiStatus(`❌ ${method} ${path}: ${e.message}`, true);
            }
        }

        async function testAuthVerify() {
            if (!getToken()) return showApiStatus('❌ لا يوجد token. سجل الدخول أولاً.', true);
            await testEndpoint('/auth/verify', 'GET');
        }

        async function testDashboard() {
            if (!getToken()) return showApiStatus('❌ لا يوجد token.', true);
            await testEndpoint('/dashboard/me', 'GET');
        }

        // --- المراسلات ---
        function getCurrentToken() {
            return document.getElementById('authToken').value.trim() || getToken();
        }

        async function loadMessages() {
            const requestId = document.getElementById('requestId').value.trim();
            const token = getCurrentToken();
            if (!requestId) return showMsgStatus('يرجى إدخال رقم الطلب', true);
            if (!token) return showMsgStatus('يرجى تسجيل الدخول أو لصق token', true);
            showMsgStatus('⏳ جاري التحميل...');
            try {
                const res = await fetch(`${BASE}/requests/${requestId}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                renderMessages(data.messages || []);
                showMsgStatus('✅ تم التحميل');
            } catch(e) {
                showMsgStatus('❌ ' + e.message, true);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!messages.length) {
                container.innerHTML = '<p style="color:#888;">لا توجد رسائل بعد.</p>';
                return;
            }
            container.innerHTML = messages.map(m => {
                const role = m.senderRole === 'admin' ? 'admin' : 'user';
                const name = m.senderRole === 'admin' ? 'الشيخ' : 'المستفيد';
                return `<div class="msg ${role}">
                    <strong>${name} (${new Date(m.createdAt).toLocaleString('ar-EG')})</strong>
                    <p>${m.messageText}</p>
                </div>`;
            }).join('');
        }

        async function sendAs(role) {
            const requestId = document.getElementById('requestId').value.trim();
            const token = getCurrentToken();
            const textArea = role === 'admin' ? document.getElementById('adminMsg') : document.getElementById('userMsg');
            const messageText = textArea.value.trim();
            if (!requestId) return showMsgStatus('أدخل رقم الطلب', true);
            if (!messageText) return showMsgStatus('اكتب رسالة', true);
            if (!token) return showMsgStatus('تحتاج Token', true);
            showMsgStatus('⏳ جاري الإرسال...');
            try {
                const res = await fetch(`${BASE}/requests/${requestId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ messageText })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                textArea.value = '';
                showMsgStatus('✅ تم الإرسال');
                loadMessages();
            } catch(e) {
                showMsgStatus('❌ ' + e.message, true);
            }
        }

        // تحميل تلقائي للـ token من localStorage
        document.addEventListener('DOMContentLoaded', () => {
            const tok = getToken();
            if (tok) document.getElementById('authToken').value = tok;
        });
    </script>
</body>
</html>
