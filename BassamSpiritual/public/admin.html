<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الإدارية | مركز النور الرباني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        .admin-header {
            background: linear-gradient(135deg, #0A1628, #1A365D);
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .admin-header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .admin-header h1 span { color: #F5B041; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }
        .admin-container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 4px solid #ccc;
        }
        .stat-card.total { border-color: #3498db; }
        .stat-card.pending { border-color: #f1c40f; }
        .stat-card.completed { border-color: #2ecc71; }
        .stat-card.rejected { border-color: #e74c3c; }
        .stat-card h3 { margin: 0; color: #6a7a8a; font-size: 1rem; }
        .stat-card .number { font-size: 2rem; font-weight: 800; margin: 10px 0 0 0; color: #0A1628; }
        
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
        }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #a0aec0; }

        .table-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 800px; }
        th { background-color: #f8fafc; color: #0A1628; padding: 15px; font-weight: 700; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; color: #4a5568; font-size: 0.95rem; }
        tr:hover { background-color: #f8fafc; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-block; }
        .status-pending { background: #fef9c3; color: #713f12; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #dcfce7; color: #14532d; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .action-btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 600; margin-left: 5px; }
        .action-btn.view { background: #0A1628; color: white; }
        .action-btn.delete { background: #fee2e2; color: #e74c3c; }

        /* النافذة المنبثقة للرد والتعديل */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 10000; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; left: 20px; top: 20px; font-size: 1.5rem; cursor: pointer; color: #a0aec0; }
        .btn-save-reply { background: linear-gradient(135deg, #F5B041, #E67E22); color: #0A1628; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="admin-header">
        <div>
            <h1>لوحة إدارة ومتابعة مركز <span>النور الرباني</span></h1>
            <small id="currentTime" style="color: #cbd5e1;"></small>
        </div>
        <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </header>

    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card total">
                <h3>إجمالي طلبات المستفيدين</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-card pending">
                <h3>طلبات قيد الانتظار</h3>
                <div class="number" id="pendingCount">0</div>
            </div>
