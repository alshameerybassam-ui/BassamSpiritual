<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مركز النور الرباني</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #4A154B; --accent-color: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin:0; }
        .auth-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; background: #ffffff; max-width: 450px; width: 100%; }
        .auth-header { background: linear-gradient(135deg, #4A154B 0%, #1A051D 100%); color: #ffffff; padding: 30px; text-align: center; border-bottom: 4px solid var(--accent-color); }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); padding: 12px; font-weight: 600; }
        .btn-primary:hover { background-color: #350f36; }
        .toggle-link { color: var(--primary-color); text-decoration: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
<div class="container p-3">
    <div class="auth-card mx-auto">
        <div class="auth-header">
            <i class="bi bi-moon-stars-fill mb-2 d-block fs-1 text-warning"></i>
            <h3 class="fw-bold mb-1">مركز النور الرباني</h3>
            <p class="small text-white-50 mb-0">للاستشارات والبرامج العلاجية الروحانية</p>
        </div>
        <div class="card-body p-4">
            <div id="alertBox" class="alert d-none"></div>
            <form id="loginForm">
                <h4 class="mb-4 text-center fw-bold text-dark">تسجيل الدخول</h4>
                <div class="mb-3">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">دخول آمن</button>
                <p class="text-center small mb-0">ليس لديك حساب؟ <span class="toggle-link" onclick="toggleAuth(true)">إنشاء حساب جديد</span></p>
            </form>
            <form id="registerForm" class="d-none">
                <h4 class="mb-4 text-center fw-bold text-dark">حساب مستفيد جديد</h4>
                <div class="mb-3"><label class="form-label">الاسم الكامل ثلاثياً</label><input type="text" id="regName" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">البريد الإلكتروني</label><input type="email" id="regEmail" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">رقم الهاتف/الواتساب</label><input type="tel" id="regPhone" class="form-control" placeholder="966500000000" required></div>
                <div class="mb-4"><label class="form-label">كلمة المرور</label><input type="password" id="regPassword" class="form-control" required></div>
                <button type="submit" class="btn btn-primary w-100 mb-3">تسجيل الحساب</button>
                <p class="text-center small mb-0">لديك حساب؟ <span class="toggle-link" onclick="toggleAuth(false)">تسجيل الدخول</span></p>
            </form>
        </div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    function toggleAuth(showRegister) {
        document.getElementById('loginForm').classList.toggle('d-none', showRegister);
        document.getElementById('registerForm').classList.toggle('d-none', !showRegister);
    }
    function showAlert(msg, type='danger') {
        const box = document.getElementById('alertBox');
        box.className = `alert alert-${type}`; box.innerText = msg; box.classList.remove('d-none');
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('loginEmail').value.trim().toLowerCase();
        const passwordInput = document.getElementById('loginPassword').value;

        try {
            const res = await AuthAPI.login(emailInput, passwordInput);
            if(res.success) {
                showAlert('مرحباً بك! جاري التوجيه...', 'success');
                
                setTimeout(() => {
                    // 🟢 تحقق مزدوج وأمان إضافي: إذا كان الحساب يخص بريدك الإلكتروني أو دالة isAdmin() ترجع true
                    if (emailInput === 'alshameerybassam@gmail.com' || AuthAPI.isAdmin()) {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 1000);
            }
        } catch(e) { showAlert(e.message); }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('regEmail').value.trim().toLowerCase();
        try {
            const res = await AuthAPI.register(document.getElementById('regName').value, emailInput, document.getElementById('regPassword').value, document.getElementById('regPhone').value);
            if(res.success) {
                showAlert('تم إنشاء الحساب، جاري تسجيل الدخول...', 'success');
                await AuthAPI.login(emailInput, document.getElementById('regPassword').value);
                
                setTimeout(() => {
                    // 🟢 تحقق عند التسجيل أيضاً
                    if (emailInput === 'alshameerybassam@gmail.com') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 1000);
            }
        } catch(e) { showAlert(e.message); }
    });
</script>
</body>
</html>
