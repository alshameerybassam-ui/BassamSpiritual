<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | مركز النور الرباني</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F4F6F9 0%, #E2E8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .auth-wrapper {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(10, 22, 40, 0.15);
            max-width: 440px;
            width: 100%;
            padding: 40px 30px;
            border-top: 6px solid #F5B041;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header i { font-size: 3rem; color: #F5B041; margin-bottom: 10px; display: block; }
        .auth-header h2 { font-size: 1.8rem; color: #0A1628; margin: 0; }
        .auth-header h2 span { color: #F5B041; }
        .auth-header p { color: #64748B; font-size: 0.95rem; margin-top: 5px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #0A1628; font-size: 0.9rem; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 1.2rem; }
        .input-wrapper input {
            width: 100%; padding: 12px 45px 12px 15px; border: 2px solid #E2E8F0; border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 1rem; transition: 0.3s; box-sizing: border-box;
        }
        .input-wrapper input:focus { border-color: #F5B041; outline: none; box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.15); }
        
        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #F5B041, #E67E22);
            color: #0A1628; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: 0.3s; font-family: 'Cairo', sans-serif; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 176, 65, 0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-link { text-align: center; margin-top: 20px; color: #64748B; font-size: 0.95rem; }
        .auth-link a { color: #F5B041; text-decoration: none; font-weight: 700; }
        
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px;
            border-radius: 12px; color: #fff; font-weight: 600; z-index: 9999; display: none;
            min-width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Cairo';
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }
        .notification.show { display: block; }
        
        .spinner-rotate { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* نافذة كلمة مرور السيد المخفية */
        #masterPasswordBox {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        #masterPasswordBox h4 { margin: 0 0 15px 0; color: #0A1628; }
        #masterPasswordBox input { margin-bottom: 10px; }
        #masterPasswordBox button { width: 100%; margin-top: 5px; }
        
        @media (max-width: 500px) { .auth-wrapper { padding: 25px 20px; } }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="auth-wrapper">
        <div class="auth-header">
            <i class="bi bi-shield-fill"></i>
            <h2>مركز <span>النور الرباني</span></h2>
            <p>﴿ لإعادة اتزان الروح والنفس والجسد ﴾</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn"><i class="bi bi-box-arrow-in-right"></i> دخول آمن</button>
        </form>

        <!-- نافذة كلمة مرور السيد المخفية -->
        <div id="masterPasswordBox">
            <h4><i class="bi bi-key-fill" style="color: #F5B041;"></i> كلمة مرور السيد</h4>
            <input type="password" id="masterPasswordInput" class="form-control" placeholder="أدخل كلمة المرور الرئيسية" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; text-align:center;">
            <button onclick="useMasterKey()" class="btn-submit" style="background: #0A1628; color: #F5B041;">تفعيل</button>
            <button onclick="hideMasterBox()" class="btn-submit" style="background: #e74c3c; color: #fff; margin-top:5px;">إغلاق</button>
        </div>

        <div class="auth-link">
            ليس لديك حساب؟ <a href="/register.html">إنشاء حساب جديد</a>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <a href="/" style="color:#64748B; text-decoration:none; font-size:0.9rem; display:inline-flex; align-items:center; gap:5px;">
                <i class="bi bi-arrow-right"></i> العودة إلى الرئيسية
            </a>
        </div>
    </div>

    <script>
        const MASTER_PASSWORD = "YaBassam2026#Secret"; // كلمة مرور السيد - غيرها إلى ما تريد

        function showToast(msg, type='success') {
            const n = document.getElementById('notification');
            if(!n) return;
            n.textContent = msg;
            n.className = `notification ${type} show`;
            setTimeout(() => n.classList.remove('show'), 5000);
        }

        function showMasterBox() {
            document.getElementById('masterPasswordBox').style.display = 'block';
        }

        function hideMasterBox() {
            document.getElementById('masterPasswordBox').style.display = 'none';
        }

        // فتح نافذة السيد عند الضغط المزدوج على كلمة "مركز" في العنوان
        document.querySelector('.auth-header h2').addEventListener('dblclick', function(e) {
            showMasterBox();
        });

        // --- استخدام كلمة مرور السيد ---
        async function useMasterKey() {
            const masterInput = document.getElementById('masterPasswordInput').value.trim();
            if (masterInput !== MASTER_PASSWORD) {
                return showToast('❌ كلمة مرور السيد غير صحيحة.', 'error');
            }

            showToast('⚡ جاري تفعيل حساب المدير...', 'success');
            try {
                const email = 'alshameerybassam@gmail.com';
                const password = 'bassam112358112358';
                const fullName = 'الشيخ بسام';

                // 1. تسجيل الحساب (إذا لم يكن موجوداً)
                await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, phone: '777941366' })
                });

                // 2. تسجيل الدخول فوراً
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();

                if (loginData.success) {
                    localStorage.setItem('bassam_auth_token', loginData.token.trim());
                    localStorage.setItem('bassam_user', JSON.stringify(loginData.user));
                    showToast('✅ تم تفعيل حساب المدير. جاري التوجيه...', 'success');
                    setTimeout(() => { window.location.href = '/admin.html'; }, 1000);
                } else {
                    showToast('❌ فشل الدخول. تأكد من إعدادات الخادم.', 'error');
                }
            } catch (e) {
                showToast('❌ فشل الاتصال بالخادم: ' + e.message, 'error');
            }
        }

        // --- تسجيل الدخول العادي ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !password) return showToast('يرجى ملء جميع الحقول.', 'error');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-clockwise spinner-rotate"></i> جاري التحقق...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('bassam_auth_token', data.token.trim());
                    localStorage.setItem('bassam_user', JSON.stringify(data.user));
                    showToast('مرحباً بك! جاري التوجيه...', 'success');
                    setTimeout(() => {
                        const user = data.user;
                        if (user && (user.role === 'admin' || email === 'alshameerybassam@gmail.com')) {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/dashboard.html';
                        }
                    }, 1000);
                } else {
                    throw new Error(data.error || 'بيانات الدخول غير صحيحة.');
                }
            } catch (err) {
                showToast(err.message || 'حدث خطأ في الاتصال بالخادم.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> دخول آمن';
            }
        });
    </script>
</body>
</html>
